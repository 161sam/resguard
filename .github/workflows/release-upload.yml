name: Release Upload

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish assets to (e.g. v0.2.1)"
        required: true
        type: string
      source_ref:
        description: "Git ref to checkout for build scripts and sources"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve and validate version
        run: |
          set -euo pipefail
          TAG_REF="${GITHUB_REF_NAME:-}"
          SOURCE_REF="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_REF="${{ github.event.inputs.release_tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          fi
          if [[ ! "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid tag ref '$TAG_REF' (expected vX.Y.Z)" >&2
            exit 1
          fi
          VERSION="${TAG_REF#v}"
          CORE_PKG_VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' packaging/deb/core/control)"
          DAEMON_PKG_VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' packaging/deb/daemon/control)"
          if [[ -z "$CORE_PKG_VERSION" || -z "$DAEMON_PKG_VERSION" ]]; then
            echo "failed to read package versions from packaging/deb/{core,daemon}/control" >&2
            exit 1
          fi
          if [[ "$CORE_PKG_VERSION" != "$VERSION" || "$DAEMON_PKG_VERSION" != "$VERSION" ]]; then
            echo "version mismatch: release_tag '$TAG_REF' expects '$VERSION' but source_ref '$SOURCE_REF' contains core='$CORE_PKG_VERSION' daemon='$DAEMON_PKG_VERSION'" >&2
            exit 1
          fi
          echo "TAG_REF=$TAG_REF" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets

          RESGUARD_DEB_PACKAGE=core ./scripts/build-deb.sh
          mv "resguard_${VERSION}_amd64.deb" "release-assets/resguard_${VERSION}_amd64.deb"

          RESGUARD_DEB_PACKAGE=daemon ./scripts/build-deb.sh
          mv "resguard-daemon_${VERSION}_amd64.deb" "release-assets/resguard-daemon_${VERSION}_amd64.deb"

          (
            cd release-assets
            sha256sum \
              "resguard_${VERSION}_amd64.deb" \
              "resguard-daemon_${VERSION}_amd64.deb" > SHA256SUMS
          )
          test -s "release-assets/resguard_${VERSION}_amd64.deb"
          test -s "release-assets/resguard-daemon_${VERSION}_amd64.deb"
          test -s "release-assets/SHA256SUMS"
          dpkg-deb -I "release-assets/resguard_${VERSION}_amd64.deb" | grep -q '^ Package: resguard$'
          dpkg-deb -I "release-assets/resguard-daemon_${VERSION}_amd64.deb" | grep -q '^ Package: resguard-daemon$'

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_REF }}
          name: ${{ env.TAG_REF }}
          files: |
            release-assets/*.deb
            release-assets/SHA256SUMS
          overwrite_files: true
          fail_on_unmatched_files: true
