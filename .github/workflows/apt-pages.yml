name: APT Repository Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish to APT Pages (e.g. v0.2.1)"
        required: true
        type: string
      source_ref:
        description: "Git ref to checkout for APT generation scripts and sources"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve and validate version
        run: |
          set -euo pipefail
          TAG_REF="${GITHUB_REF_NAME:-}"
          SOURCE_REF="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_REF="${{ github.event.inputs.release_tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          fi
          if [[ ! "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid tag ref '$TAG_REF' (expected vX.Y.Z)" >&2
            exit 1
          fi
          VERSION="${TAG_REF#v}"
          CORE_PKG_VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' packaging/deb/core/control)"
          DAEMON_PKG_VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' packaging/deb/daemon/control)"
          if [[ -z "$CORE_PKG_VERSION" || -z "$DAEMON_PKG_VERSION" ]]; then
            echo "failed to read package versions from packaging/deb/{core,daemon}/control" >&2
            exit 1
          fi
          if [[ "$CORE_PKG_VERSION" != "$VERSION" || "$DAEMON_PKG_VERSION" != "$VERSION" ]]; then
            echo "version mismatch: release_tag '$TAG_REF' expects '$VERSION' but source_ref '$SOURCE_REF' contains core='$CORE_PKG_VERSION' daemon='$DAEMON_PKG_VERSION'" >&2
            exit 1
          fi
          echo "TAG_REF=$TAG_REF" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build DEB artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets

          RESGUARD_DEB_PACKAGE=core ./scripts/build-deb.sh
          mv "resguard_${VERSION}_amd64.deb" "release-assets/resguard_${VERSION}_amd64.deb"

          RESGUARD_DEB_PACKAGE=daemon ./scripts/build-deb.sh
          mv "resguard-daemon_${VERSION}_amd64.deb" "release-assets/resguard-daemon_${VERSION}_amd64.deb"

      - name: Import APT signing key
        env:
          RESGUARD_APT_GPG_PRIVATE_KEY: ${{ secrets.RESGUARD_APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${RESGUARD_APT_GPG_PRIVATE_KEY}" ]]; then
            echo "missing secret: RESGUARD_APT_GPG_PRIVATE_KEY" >&2
            exit 1
          fi

          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

          KEY_FILE="$(mktemp)"
          cleanup() {
            rm -f "$KEY_FILE"
          }
          trap cleanup EXIT

          printf '%s' "$RESGUARD_APT_GPG_PRIVATE_KEY" > "$KEY_FILE"
          if ! gpg --batch --homedir "$GNUPGHOME" --import "$KEY_FILE"; then
            echo "failed to import RESGUARD_APT_GPG_PRIVATE_KEY into GNUPGHOME" >&2
            exit 1
          fi

          echo "Imported secret keys:"
          gpg --batch --homedir "$GNUPGHOME" --list-secret-keys --keyid-format LONG

          SECRET_KEY_COUNT="$(gpg --batch --homedir "$GNUPGHOME" --list-secret-keys --with-colons | awk -F: '/^sec:/ {c++} END {print c+0}')"
          if [[ "$SECRET_KEY_COUNT" -eq 0 ]]; then
            echo "no secret keys found after import" >&2
            exit 1
          fi

          FINGERPRINT="$(gpg --batch --homedir "$GNUPGHOME" --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ -z "$FINGERPRINT" ]]; then
            echo "failed to resolve imported secret key fingerprint" >&2
            exit 1
          fi
          echo "APT_GPG_KEY_ID=$FINGERPRINT" >> "$GITHUB_ENV"

      - name: Generate signed APT repository
        env:
          RESGUARD_APT_GPG_PASSPHRASE: ${{ secrets.RESGUARD_APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          PASS_ARGS=()
          if [[ -n "${RESGUARD_APT_GPG_PASSPHRASE:-}" ]]; then
            PASS_ARGS=(--gpg-passphrase-env RESGUARD_APT_GPG_PASSPHRASE)
          fi
          ./scripts/generate-apt-repo.sh \
            --repo-dir ./apt \
            --input-dir ./release-assets \
            --distribution stable \
            --component main \
            --arch amd64 \
            --sign-key "$APT_GPG_KEY_ID" \
            --gpg-homedir "$GNUPGHOME" \
            "${PASS_ARGS[@]}" \
            --export-pubkey ./apt/pubkey.gpg

      - name: Validate APT index contains split packages
        run: |
          set -euo pipefail
          PKG_FILE="apt/dists/stable/main/binary-amd64/Packages"
          test -s "$PKG_FILE"
          grep -q '^Package: resguard$' "$PKG_FILE"
          grep -q '^Package: resguard-daemon$' "$PKG_FILE"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apt

      - name: Cleanup GnuPG home
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${GNUPGHOME:-}" ]]; then
            rm -rf "$GNUPGHOME"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
