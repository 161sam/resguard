name: APT Repository Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish to APT Pages (e.g. v0.2.1)"
        required: true
        type: string
      source_ref:
        description: "Git ref to checkout for APT generation scripts and sources"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      signing_ready: ${{ steps.signing_guard.outputs.signing_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve and validate version
        run: |
          set -euo pipefail
          TAG_REF="${GITHUB_REF_NAME:-}"
          SOURCE_REF="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_REF="${{ github.event.inputs.release_tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          fi
          if [[ ! "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid tag ref '$TAG_REF' (expected vX.Y.Z)" >&2
            exit 1
          fi
          VERSION="${TAG_REF#v}"
          PKG_VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' packaging/deb/control)"
          if [[ -z "$PKG_VERSION" ]]; then
            echo "failed to read package version from packaging/deb/control" >&2
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "version mismatch: release_tag '$TAG_REF' expects '$VERSION' but source_ref '$SOURCE_REF' contains packaging version '$PKG_VERSION'" >&2
            exit 1
          fi
          echo "TAG_REF=$TAG_REF" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check signing secret availability
        id: signing_guard
        env:
          RESGUARD_APT_GPG_PRIVATE_KEY: ${{ secrets.RESGUARD_APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${RESGUARD_APT_GPG_PRIVATE_KEY}" ]]; then
            echo "signing_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "signing_ready=false" >> "$GITHUB_OUTPUT"
          {
            echo "### APT publish skipped"
            echo
            echo "Missing secret: \`RESGUARD_APT_GPG_PRIVATE_KEY\`."
            echo "Release assets are still published by \`release-upload.yml\`."
            echo "After adding the secret, rerun this workflow with \`workflow_dispatch\` using \`release_tag\` and the desired \`source_ref\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build DEB artifacts
        if: steps.signing_guard.outputs.signing_ready == 'true'
        run: |
          set -euo pipefail
          mkdir -p release-assets

          RESGUARD_DEB_WITH_DAEMON=0 ./scripts/build-deb.sh
          mv "resguard_${VERSION}_amd64.deb" "release-assets/resguard_${VERSION}_amd64.deb"

          RESGUARD_DEB_WITH_DAEMON=1 ./scripts/build-deb.sh
          mv "resguard_${VERSION}_amd64.deb" "release-assets/resguard_${VERSION}_amd64_daemon.deb"

      - name: Import APT signing key
        if: steps.signing_guard.outputs.signing_ready == 'true'
        env:
          RESGUARD_APT_GPG_PRIVATE_KEY: ${{ secrets.RESGUARD_APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${RESGUARD_APT_GPG_PRIVATE_KEY}" ]]; then
            echo "missing secret: RESGUARD_APT_GPG_PRIVATE_KEY" >&2
            exit 1
          fi

          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

          printf '%s' "$RESGUARD_APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          if [[ -z "$KEY_ID" ]]; then
            echo "failed to resolve secret key id after import" >&2
            exit 1
          fi
          echo "APT_GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Generate signed APT repository
        if: steps.signing_guard.outputs.signing_ready == 'true'
        env:
          RESGUARD_APT_GPG_PASSPHRASE: ${{ secrets.RESGUARD_APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          PASS_ARGS=()
          if [[ -n "${RESGUARD_APT_GPG_PASSPHRASE:-}" ]]; then
            PASS_ARGS=(--gpg-passphrase-env RESGUARD_APT_GPG_PASSPHRASE)
          fi
          ./scripts/generate-apt-repo.sh \
            --repo-dir ./apt \
            --input-dir ./release-assets \
            --distribution stable \
            --component main \
            --arch amd64 \
            --sign-key "$APT_GPG_KEY_ID" \
            --gpg-homedir "$GNUPGHOME" \
            "${PASS_ARGS[@]}" \
            --export-pubkey ./apt/pubkey.gpg

      - name: Configure Pages
        if: steps.signing_guard.outputs.signing_ready == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.signing_guard.outputs.signing_ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apt

  deploy:
    needs: build
    if: needs.build.outputs.signing_ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
